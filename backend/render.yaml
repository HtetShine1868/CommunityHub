services:
  - type: web
    name: community-hub-api
    runtime: go
    region: singapore  # Closest to you
    buildCommand: go build -o app ./cmd/api
    startCommand: ./app
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: community-hub-db
          property: connectionString
      - key: PORT
        value: 8080

databases:
  - name: community-hub-db
    databaseName: communityhub
    user: communityhub_user
    region: singapore
    plan: free